INHERIT: docs/mkdocs-base.yml

site_name: DummyPy
site_url: https://markrichardson.github.io/dummyrepo/
repo_url: https://github.com/markrichardson/dummyrepo
repo_name: markrichardson/dummyrepo

docs_dir: docs

nav:
  - Home: index.md
  - API Reference:
      - Payoffs: api/payoffs.md
      - Things: api/things.md
  - Development:
      - Tests: development/TESTS.md
      - Docker: development/DOCKER.md
      - Devcontainer: development/DEVCONTAINER.md
      - Marimo: development/MARIMO.md

plugins:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
